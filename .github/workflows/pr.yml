name: Review PR

on:
  workflow_call:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pi-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || '' }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Pi agent
        uses: shaftoe/pi-coding-agent-action@dev
        with:
          github_token: ${{ secrets.gh_token }}
          provider: ${{ vars.PROVIDER }}
          model: ${{ vars.MODEL }}
          token: ${{ secrets.LLM_API_KEY }}
          thinking_level: ${{ vars.THINKING_LEVEL }}
          prompt: This is a GitHub PR (#${{ github.event.pull_request.number }}) that needs code review. Focus on identifying issues, bugs, security concerns, and improvements.
          extensions: |
            npm:pi-librarian
