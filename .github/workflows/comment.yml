name: Pi AI Agent

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pi-agent:
    uses: ./.github/workflows/pi-22.yml
    with:
      allowed_actor: shaftoe
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      token: ${{ secrets.LLM_API_KEY }}
