name: Pi AI Agent (Node 22)

on:
  workflow_call:
    inputs:
      prompt:
        type: string
        required: false
      allowed_actor:
        type: string
        required: false
    secrets:
      token:
        required: true
      gh_token:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pi-agent:
    if: |
      (startsWith(github.event.comment.body, '/pi') || startsWith(github.event.review.body, '/pi')) &&
      (inputs.allowed_actor == '' || github.actor == inputs.allowed_actor)

    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Pi agent
        uses: shaftoe/pi-coding-agent-action@dev
        with:
          github_token: ${{ secrets.gh_token }}
          provider: ${{ vars.PROVIDER }}
          model: ${{ vars.MODEL }}
          token: ${{ secrets.token }}
          thinking_level: ${{ vars.THINKING_LEVEL }}
          prompt: ${{ inputs.prompt }}
          extensions: |
            npm:pi-librarian
